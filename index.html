tracts, expense receipts) and routes the\nextracted fields to the appropriate modules with confidence scoring.\n"}, {"id": "ai_reconciliation", "name": "AI-Assisted Reconciliation", "description": "AI that matches records across sub-ledgers (such as AR aging against\nCRM stages, or inventory counts against sales velocity) and surfaces\nmatches plus exceptions for human review.\n"}, {"id": "cross_module_recommendations", "name": "Recommendation Engine", "description": "AI that recommends next actions based on context spanning multiple\nmodules (such as churn-risk customers identified by combining\npayment history, support tickets, and sales engagement signals).\n"}, {"id": "others", "name": "Other ERP-Wide AI Features", "description": "Please define any other ERP-wide AI capabilities your solution\nprovides that are not covered above.\n", "kind": "free_text"}]}, "modules": [{"id": "100", "slug": "financial_management", "name": "Finance Module", "description": "The core financial management component of an ERP system that centralises and automates an organisation's financial processes and accounting functions.", "sub_modules": [{"name": "Core Finance Module Features", "gated": false, "umbrella_question": "Does your module integrate a general ledger, customer invoicing, vendor bills, bank-ledger matching and also have other relevant features that facilitate & streamline core accounting processes?", "features": []}], "standalone": [{"id": "100.02", "title": "InvoiceNow-Ready Solution Provider Accreditation", "tier": "mandatory", "body": "Is your solution listed on IMDA InvoiceNow-Ready Solution Provider (IRSP) Listing? [1] If you are the Product Principal of the solution, you are required to be accredited as an IRSP by IMDA. [2] If you are the reseller of the solution, your Solution Product Principal must declare to IMDA that you are an authorised reseller of their solution. Note: For more information on InvoiceNow, refer to: https://www.imda.gov.sg/how-we-can-help/nati s including but not limited to vehicle tracking, maintenance scheduling, fuel management, driver assignments, compliance monitoring, and fleet cost optimization.", "sub_modules": [{"name": "Fleet Management Module Features", "gated": false, "umbrella_question": "Does your module utilize telematics and GPS for real-time fleet tracking, automate dispatch and dynamic route planning using live traffic data, and also have other relevant features that facilitate & streamline fleet management and transport operations?", "features": []}], "standalone": [{"id": "105.02", "title": "Fleet Management Module Safety Features", "tier": "preferred", "body": "Does your module monitor driver status to detect fatigue or distractions, provide advanced driver assistance warnings for potential collisions, and also have other relevant features that facilitate & streamline driver safety?"}], "ai_features": {"umbrella": "Does your solution incorporate any form of artificial intelligence in your ERP module with the ultimate goal of enhancing operational efficiency/productivity and/or improve decision-making?", "examples": ["Predictive Vehicle Maintenance - Machine learning predicts mechanical issues using telematics data points (e.g. fluctuations in battery voltage, engine temperature, etc.).", "Dynamic Dispatching & Route Optimization - AI continuously calculates routes by cross-referencing live variables (e.g. traffic bottlenecks, severe weather, changing customer delivery windows, etc.) with historical operational patterns."], "others": true}}, {"id": "106", "slug": "field_service_management", "name": "Field Service Management Module", "description": "Coordinates on-site service operations, technician scheduling, mobile workforce management, and service contract administration.", "sub_modules": [{"name": "Field Service Management (FSM) Module Features", "gated": false, "umbrella_question": "Does your module create, assign, and allow the scheduling of work orders based on technician profiles, offer a mobile app for field workers to update job statuses with digital proof, and also have other relevant features that facilitate & streamline field service management (FSM) workflows?", "features": []}], "standalone": [], "ai_features": {"umbrella": "Does your solution incorporate any form of artificial intelligence in your ERP module with the ultimate goal of enhancing operational efficiency/productivity and/or improve decision-making?", "examples": ["Gen-AI Generated Summaries - Generate work order summaries that transform rough notes taken by mobile field workers, into well-organised, concise and easy-to-understand summaries.", "Auto-Scheduling & Dispatch - AI scheduling engine continuously optimizes the daily schedule autonomously."], "others": true}}, {"id": "107", "slug": "project_management", "name": "Project Management Module", "description": "Manages project planning, resource allocation, timeline tracking and budgeting.", "sub_modules": [{"name": "Project Management (PM) Module Features", "gated": false, "umbrella_question": "Does your module manage and schedule project tasks with clear deadlines and dependencies, track team workloads and resource allocation, and also have other relevant features that facilitate & streamline the project management (PM) process?", "features": []}], "standalone": [], "ai_features": {"umbrella": "Does your solution incorporate any form of artificial intelligence in your ERP module with the ultimate goal of enhancing operational efficiency/productivity and/or improve decision-making?", "examples": ["Automated Progress & Status Reporting - AI reads task titles, activity logs, descriptions, comments, etc. across entire project boards and compresses information into structured reports.", "Predictive Risk Detection - AI continuously analyzes historical completion rates, current velocity, task dependencies, team capacity, etc. and alerts potential delays ahead of time, proactively."], "others": true}}, {"id": "108", "slug": "asset_management", "name": "Asset Management Module", "description": "Tracks and manages fixed assets throughout their lifecycle, including asset registration, depreciation calculations, maintenance scheduling, and disposal processes.", "sub_modules": [{"name": "Asset Management Module Features", "gated": false, "umbrella_question": "Does your module track the centralized lifecycle of assets from procurement to decommissioning, automate maintenance scheduling based on usage thresholds, and continuously monitor equipment utilization and compliance histories across multiple sites, and also have other relevant features that facilitate & streamline asset management?", "features": []}], "standalone": [], "ai_features": {"umbrella": "Does your solution incorporate any form of artificial intelligence in your ERP module with the ultimate goal of enhancing operational efficiency/productivity and/or improve decision-making?", "examples": [], "others": true}}], "moduleOrder": [{"slug": "financial_management", "full": "Financial Management"}, {"slug": "sales_and_crm", "full": "Sales & CRM"}, {"slug": "supply_chain_and_inventory", "full": "Supply Chain & Inventory"}, {"slug": "human_resources_management", "full": "Human Resources"}, {"slug": "manufacturing_management", "full": "Manufacturing"}, {"slug": "asset_management", "full": "Asset Management"}, {"slug": "field_service_management", "full": "Field Service"}, {"slug": "fleet_management", "full": "Fleet Management"}, {"slug": "project_management", "full": "Project Management"}, {"slug": "others", "full": "Others / Cross-cutting"}], "sectors": [{"value": "accountancy", "label": "Accountancy"}, {"value": "advanced_manufacturing", "label": "Advanced Manufacturing"}, {"value": "built_environment", "label": "Built Environment"}, {"value": "early_childhood", "label": "Early Childhood"}, {"value": "engineering_services", "label": "Engineering Services"}, {"value": "environmental_services", "label": "Environmental Services"}, {"value": "estate_agency", "label": "Estate Agency"}, {"value": "food", "label": "Food"}, {"value": "marine_offshore", "label": "Marine & Offshore"}, {"value": "personal_care_services", "label": "Personal Care Services"}, {"value": "precision_engineering", "label": "Precision Engineering"}, {"value": "retail", "label": "Retail"}, {"value": "security", "label": "Security"}, {"value": "wholesale_trade", "label": "Wholesale Trade"}]};window.__GATE__="aadb90adcb2ca911158949ccf55150064ca938f3093d61c42a3b7c50adc9d21e";</script><script>
const D = window.__DATA__;
const S = { ans:{}, txt:{}, mods:{} };
const byslug = s => D.modules.find(m=>m.slug===s);
const esc = s => { const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; };
const nl2br = s => esc(s).replace(/\n/g,'<br>');
const val = k => S.ans[k];
const yn = k => S.ans[k]==='yes'?'yes':S.ans[k]==='no'?'no':null;
function setAns(k,v){ if(!v) delete S.ans[k]; else S.ans[k]=v; render(); }
function setMod(s,on){ if(on) S.mods[s]=1; else delete S.mods[s]; render(); }
function splitFeat(f){ const i=f.indexOf(' - '); return i<0?{t:f,d:''}:{t:f.slice(0,i),d:f.slice(i+3)}; }
function chip(t){ const m=(t||'').toLowerCase().indexOf('mand')===0; return '<span class="chip '+(m?'m':'p')+'">'+esc(t)+'</span>'; }
function radio(key,opts){ const nm='r_'+key.replace(/[^a-zA-Z0-9_]/g,'_'); return '<span class="yn">'+opts.map(o=>'<label><input type="radio" name="'+nm+'" data-key="'+key+'" value="'+o.v+'" '+(S.ans[key]===o.v?'checked':'')+'>'+esc(o.l)+'</label>').join('')+'</span>'; }
function ynr(key){ return radio(key,[{v:'yes',l:'Yes'},{v:'no',l:'No'}]); }
function check(key,label,desc){ return '<li class="b"><label class="bl"><div class="bn">'+esc(label)+'</div>'+(desc?'<div class="bd">'+esc(desc)+'</div>':'')+'</label><input type="checkbox" data-key="'+key+'" '+(S.ans[key]==='yes'?'checked':'')+'></li>'; }
function feats(sm){ if(!(sm.features||[]).length) return ''; return '<ul class="feats">'+sm.features.map(f=>{const x=splitFeat(f);return '<li>'+esc(x.t)+(x.d?' - '+esc(x.d):'')+'</li>';}).join('')+'</ul>'; }
function capList(caps){ if(!(caps||[]).length) return ''; return '<ul class="feats">'+caps.map(function(c){ var nm=(typeof c==='string')?c:c.name; var d=(typeof c==='object'&&c.description)?c.description:''; return '<li><b>'+esc(nm)+'</b>'+(d?': '+esc(d):'')+'</li>'; }).join('')+'</ul>'; }
function inpCue(k){ const m={text:'Short answer',date:'Date',upload:'Attachment'}; return '<span class="ph">'+(m[k]||k)+'</span>'; }

function moduleStatus(slug){
  let core=[],mand=[],describeBlank=false;
  if(slug==='others'){ mand=['others:evidence']; describeBlank=!((S.txt['others:describe']||'').trim()); }
  else { const m=byslug(slug); m.sub_modules.forEach((sm,i)=>{ core.push(slug+':sub:'+i); if(!sm.gated) mand.push(slug+':sub:'+i); }); (m.standalone||[]).forEach(s=>{ if(s.tier==='mandatory') mand.push(slug+':std:'+s.id); }); }
  const mandNo=mand.filter(k=>val(k)==='no').length;
  const mandBlank=mand.filter(k=>val(k)!=='yes'&&val(k)!=='no').length;
  const hasCore=core.length>0, coreYes=core.some(k=>val(k)==='yes'), coreAll=core.every(k=>val(k)==='yes'||val(k)==='no');
  if(mandNo) return 'disqualified';
  if(hasCore&&coreAll&&!coreYes) return 'disqualified';
  if(mandBlank||describeBlank) return 'incomplete';
  if(hasCore&&!coreYes) return 'incomplete';
  return 'passed';
}
function banner(st){ const M={passed:['ok','✓ Qualifies - at least one core capability + all mandatory met.'],disqualified:['bad','✗ Disqualified - this module cannot be submitted.'],incomplete:['warn','○ Incomplete - more answers needed.']}; return '<div class="ban '+M[st][0]+'">'+M[st][1]+'</div>'; }

function solutionGate(){
  // §1 solution-level mandatory: compliance Y/N + the internal-integration
  // umbrella must be Yes. Returns {no, blank} counts of unmet items.
  let no=0, blank=0;
  for(const q of D.compliance){
    if(q.applies_when){ let vis=true; for(const k in q.applies_when){ if(S.ans[k]!==q.applies_when[k]) vis=false; } if(!vis) continue; }
    if(q.tier==='mandatory' && q.answer_kind!=='role_picker'){ const v=S.ans[q.id]; if(v==='no') no++; else if(v!=='yes') blank++; }
  }
  const ib=S.ans['s1b']; if(ib==='no') no++; else if(ib!=='yes') blank++;
  return {no, blank};
}
function topBanner(){
  const sel=D.moduleOrder.filter(m=>S.mods[m.slug]);
  const sg=solutionGate();
  if(!sel.length) return '<div class="ban warn">Answer §1, then select at least 3 modules in §2 to begin.</div>';
  const cnt=sel.filter(m=>m.slug!=='others').length;
  const sts=sel.map(m=>moduleStatus(m.slug));
  const dq=sts.filter(s=>s==='disqualified').length;
  if(sg.no || dq) return '<div class="ban bad">✗ Blocked - resolve '+(sg.no?'§1 compliance/integration answered “No”'+(dq?' and ':''):'')+(dq?dq+' disqualified module(s)':'')+' before submitting.</div>';
  if(cnt>=3 && sg.blank===0 && sts.every(s=>s==='passed')) return '<div class="ban ok">✓ §1 complete and all '+sel.length+' selected module(s) qualify - ready to submit.</div>';
  return '<div class="ban warn">In progress - complete §1 and every selected module (at least 3 required).</div>';
}

function complianceSec(){
  let h='<h2>§1 · Solution-level</h2><p class="sub">Compliance baseline + internal-modules integration + ERP-Wide AI Features.</p><div class="sh">§1a · Compliance baseline</div>';
  D.compliance.forEach(q=>{
    if(q.applies_when){ for(const k in q.applies_when){ if(S.ans[k]!==q.applies_when[k]) return; } }
    const tier=q.tier==='preferred'?'Preferred':'Mandatory';
    const body=(q.body_sections||[]).map(s=>s.paragraph||'').join(' ').trim();
    const role=q.answer_kind==='role_picker'&&q.role_options;
    const ctrl=role?radio(q.id,q.role_options.map(o=>({v:(o.id||o.value),l:o.label}))):ynr(q.id);
    h+='<div class="q"><div class="qh">'+chip(tier)+'<span class="qt">'+esc(q.topic||q.id)+'</span>'+(role?'':ctrl)+'</div>';
    if(role) h+='<div class="ctrlrow">'+ctrl+'</div>';
    if(q.question) h+='<div class="qq">'+nl2br(q.question)+'</div>';
    if(body) h+='<div class="bd2">'+nl2br(body)+'</div>';
    if((q.inputs||[]).length && yn(q.id)==='yes') h+='<div class="inp">'+q.inputs.map(i=>inpCue(i.kind)).join('')+'</div>';
    h+='</div>';
  });
  h+='<div class="sh">§1b · Internal-modules integration</div>';
  h+='<div class="q"><div class="qh">'+chip('Mandatory')+'<span class="qt">'+esc(D.internal.title)+'</span>'+ynr('s1b')+'</div><div class="qq">'+esc(D.internal.umbrella_question)+'</div>'+capList(D.internal.caps)+'</div>';
  h+='<div class="sh">§1c · ERP-Wide AI Features</div>';
  h+='<div class="q"><div class="qh">'+chip('Preferred')+'<span class="qt">AI Features</span>'+ynr('s1c')+'</div><div class="qq">'+esc(D.ai.umbrella)+'</div>';
  if(yn('s1c')==='yes'){ h+='<p class="hint">Select all that apply.</p><ul class="bl-list">';
    D.ai.caps.forEach((c,i)=>{ h+= c.kind==='free_text'?check('s1c:other','Others - please specify',c.description||''):check('s1c:ex:'+i,c.name,c.description||''); });
    h+='</ul>';
    if(S.ans['s1c:other']==='yes') h+='<textarea class="ta" data-txt="s1c:othertext" placeholder="Please define your other AI features.">'+esc(S.txt['s1c:othertext']||'')+'</textarea>';
  }
  h+='</div>'; return h;
}

function moduleBlock(m){
  const picker=m.sub_modules.length>=2 && m.sub_modules.every(s=>s.gated);
  let h='<div class="mod"><div class="modh">'+esc(m.id)+' · '+esc(m.name)+'</div>'+banner(moduleStatus(m.slug));
  if(picker){
    h+='<div class="q"><div class="qh">'+chip('Mandatory (≥1)')+'<span class="qt">Sub-modules</span></div><p class="qq">Which '+esc(m.name)+' sub-modules does your solution provide? Select at least one to qualify for this module.</p><ul class="bl-list">';
    m.sub_modules.forEach((sm,i)=>{ h+='<li class="b"><label class="bl"><div class="bn">'+esc(sm.name)+'</div><div class="bd">'+esc(sm.umbrella_question)+'</div>'+feats(sm)+'</label><input type="checkbox" data-key="'+m.slug+':sub:'+i+'" '+(S.ans[m.slug+':sub:'+i]==='yes'?'checked':'')+'></li>'; });
    h+='</ul></div>';
  } else {
    m.sub_modules.forEach((sm,i)=>{ h+='<div class="q"><div class="qh">'+chip(sm.gated?'Preferred':'Mandatory')+'<span class="qt">'+esc(sm.name)+'</span>'+ynr(m.slug+':sub:'+i)+'</div><div class="qq">'+esc(sm.umbrella_question)+'</div>'+feats(sm)+'</div>'; });
  }
  (m.standalone||[]).forEach(s=>{ const mand=s.tier==='mandatory'; h+='<div class="q"><div class="qh">'+chip(mand?'Mandatory':'Preferred')+'<span class="qt">'+esc(s.title)+'</span>'+ynr(m.slug+':std:'+s.id)+'</div>'+(s.body?'<div class="qq">'+nl2br(s.body)+'</div>':'')+'</div>'; });
  h+='<div class="q"><div class="qh">'+chip('Preferred')+'<span class="qt">AI Features</span>'+ynr(m.slug+':ai')+'</div><div class="qq">'+esc(m.ai_features.umbrella)+'</div>';
  if(yn(m.slug+':ai')==='yes'){ h+='<p class="hint">Select all that apply.</p><ul class="bl-list">';
    (m.ai_features.examples||[]).forEach((ex,i)=>{ const x=splitFeat(ex); h+=check(m.slug+':ai:ex:'+i,x.t,x.d); });
    if(m.ai_features.others) h+=check(m.slug+':ai:other','Others - please define','');
    h+='</ul>';
    if(m.ai_features.others && S.ans[m.slug+':ai:other']==='yes') h+='<textarea class="ta" data-txt="'+m.slug+':ai:othertext" placeholder="Please define.">'+esc(S.txt[m.slug+':ai:othertext']||'')+'</textarea>';
  }
  h+='</div></div>'; return h;
}

function othersBlock(){
  let h='<div class="mod"><div class="modh">1000 · Others / Cross-cutting</div>'+banner(moduleStatus('others'));
  h+='<div class="q"><div class="qh">'+chip('Mandatory')+'<span class="qt">Describe the other module(s)</span></div><textarea class="ta" data-txt="others:describe" placeholder="Describe the other module(s) your solution provides...">'+esc(S.txt['others:describe']||'')+'</textarea></div>';
  h+='<div class="q"><div class="qh">'+chip('Mandatory')+'<span class="qt">Evidence - Track Record</span>'+ynr('others:evidence')+'</div><div class="qq">Submit 3 completed project proposals (modules covered, completion proofs, dates, billed costs, client sectors).</div>';
  h+='<p class="hint">Clients\' sector(s):</p><div class="secs">'+D.sectors.map(o=>'<label class="sec"><input type="checkbox" data-key="others:sector:'+o.value+'" '+(S.ans['others:sector:'+o.value]==='yes'?'checked':'')+'>'+esc(o.label)+'</label>').join('')+'</div></div></div>';
  return h;
}

function modulesSec(){
  let h='<h2>§2 · Modules</h2><p class="sub">Pick the modules your solution provides, then answer each.</p>';
  h+='<div class="q"><div class="qh">'+chip('Mandatory')+'<span class="qt">Which ERP modules does your solution provide?</span></div><p class="hint">Tick at least 3 ("Others" does not count toward the 3).</p><ul class="bl-list">';
  D.moduleOrder.forEach(m=>{ h+='<li class="b"><label class="bl"><div class="bn">'+esc(m.full)+'</div></label><input type="checkbox" data-mod="'+m.slug+'" '+(S.mods[m.slug]?'checked':'')+'></li>'; });
  const cnt=Object.keys(S.mods).filter(s=>s!=='others').length;
  h+='</ul><p class="gate '+(cnt>=3?'ok':'warn')+'">'+cnt+'/3 modules selected'+(cnt>=3?' ✓':'')+'</p></div>';
  D.moduleOrder.forEach(m=>{ if(!S.mods[m.slug]) return; h+= m.slug==='others'?othersBlock():moduleBlock(byslug(m.slug)); });
  return h;
}

function s3Sec(){
  let h='<h2>§3 · Third-Party Integration (optional)</h2>';
  h+='<div class="q"><div class="qh">'+chip('Preferred')+'<span class="qt">Third-Party Integration Experience</span>'+ynr('s3:done')+'</div><div class="qq">Have you completed any third-party integrations - integrating an external module or application into your solution at a customer\'s request?</div></div>';
  if(yn('s3:done')==='yes'){
    h+='<div class="q"><div class="qh"><span class="qt">Which third-party ERP module types can your solution integrate with?</span></div><p class="hint">Select all that apply.</p><ul class="bl-list">';
    D.moduleOrder.filter(m=>m.slug!=='others').forEach(m=>{ h+=check('s3:type:'+m.slug,m.full,''); });
    h+='</ul></div>';
    h+='<div class="q"><div class="qh">'+chip(D.external.tier==='preferred'?'Preferred':'Mandatory')+'<span class="qt">'+esc(D.external.title)+'</span>'+ynr('s3:external')+'</div><div class="qq">'+esc(D.external.umbrella_question)+'</div>'+capList(D.external.caps)+'</div>';
    h+='<div class="q"><div class="qh">'+chip('Mandatory')+'<span class="qt">Integration track record</span>'+ynr('s3:overall')+'</div><div class="qq">At least 1 completed project proposal: scope shows the integration, the method is indicated, and there is clear proof of completion. Singapore-based companies; include one of your submitted modules.</div>';
    h+='<div class="row"><span>Proof page number</span><input class="ti" data-txt="s3:page" value="'+esc(S.txt['s3:page']||'')+'" placeholder="e.g. p.12"></div>';
    h+='<p class="hint">Integration method(s):</p><div class="secs">'+['API','Webhooks','Event-Driven Architecture'].map((l,i)=>'<label class="sec"><input type="checkbox" data-key="s3:method:'+i+'" '+(S.ans['s3:method:'+i]==='yes'?'checked':'')+'>'+l+'</label>').join('')+'</div>';
    h+='<textarea class="ta" data-txt="s3:apps" placeholder="Third-party application name(s), e.g. Xero, QuickBooks...">'+esc(S.txt['s3:apps']||'')+'</textarea>';
    h+='<p class="hint">Client sector(s):</p><div class="secs">'+D.sectors.map(o=>'<label class="sec"><input type="checkbox" data-key="s3:sector:'+o.value+'" '+(S.ans['s3:sector:'+o.value]==='yes'?'checked':'')+'>'+esc(o.label)+'</label>').join('')+'</div></div>';
  }
  return h;
}

function render(){
  const y=window.scrollY;
  document.getElementById('app').innerHTML =
    '<h1>Survey v2 - Vendor Self-Assessment</h1>'+
    '<p class="note">Interactive read-only preview. Nothing is saved or submitted; answers reset on refresh. Mirrors the live survey\'s gating logic.</p>'+
    topBanner()+complianceSec()+modulesSec()+s3Sec();
  window.scrollTo(0,y);
}
const app=document.getElementById('app');
app.addEventListener('change',e=>{const t=e.target;
  if(t.dataset.mod!==undefined) return setMod(t.dataset.mod,t.checked);
  if(t.dataset.key!==undefined){ if(t.type==='radio') return setAns(t.dataset.key,t.value); if(t.type==='checkbox') return setAns(t.dataset.key,t.checked?'yes':''); }
});
app.addEventListener('input',e=>{ if(e.target.dataset.txt!==undefined) S.txt[e.target.dataset.txt]=e.target.value; });
app.addEventListener('focusout',e=>{ if(e.target.dataset.txt!==undefined) render(); });

// Optional shared-passphrase soft gate (when window.__GATE__ is a SHA-256 hex).
async function sha256hex(s){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
function gateScreen(){
  app.innerHTML='<div class="gate-wrap"><h1>Survey v2 - preview</h1><p>Enter the access code to view this survey.</p><div class="gate-row"><input id="gpw" type="password" placeholder="Access code" autofocus><button id="gbtn">Enter</button></div><p id="gerr" class="gerr"></p></div>';
  const go=async()=>{ try{ const h=await sha256hex(document.getElementById('gpw').value); if(h===window.__GATE__){ try{sessionStorage.setItem('ierp_unlocked','1');}catch(e){} render(); } else { document.getElementById('gerr').textContent='Incorrect code - try again.'; } }catch(e){ document.getElementById('gerr').textContent='Please open this page over https.'; } };
  document.getElementById('gbtn').addEventListener('click',go);
  document.getElementById('gpw').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}
let __unlocked=false; try{ __unlocked=sessionStorage.getItem('ierp_unlocked')==='1'; }catch(e){}
if(window.__GATE__ && !__unlocked) gateScreen(); else render();
</script></body></html>
