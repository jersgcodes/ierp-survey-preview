<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'><title>iERP Survey v2 - preview</title><style>
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font:13px/1.5 -apple-system,Helvetica,Arial,sans-serif;color:#0f172a;background:#f1f5f9;display:flex;flex-direction:column}
header.top{background:#0f172a;color:#fff;padding:10px 16px}
header.top h1{margin:0;font-size:15px}
.tabs{display:flex;gap:6px;padding:8px 16px;background:#fff;border-bottom:1px solid #e2e8f0}
.tab{padding:6px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#f8fafc;cursor:pointer;font-weight:600;font-size:12.5px}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.panes{flex:1;min-height:0}
.pane{display:none;height:100%}.pane.active{display:block}
.pane.split.active{display:flex}
iframe{width:100%;height:100%;border:0;background:#fff}
.split iframe{width:50%;border-right:1px solid #cbd5e1}
.gate{max-width:430px;margin:60px auto;background:#fff;border:1px solid #cbd5e1;border-radius:8px;padding:24px}
.gate input{width:100%;padding:8px;font-size:13px;border:1px solid #cbd5e1;border-radius:4px;margin-top:10px}
.gate button{margin-top:10px;padding:8px 16px;background:#0f172a;color:#fff;border:0;border-radius:4px;font-weight:600;cursor:pointer}
.gerr{color:#991b1b;font-size:12px;min-height:14px;margin-top:8px}
.hidden{display:none!important}
</style></head><body><div id="gatebox" class="gate"><h1 style="font-size:17px;margin:0">Survey v2 - preview</h1><p style="font-size:13px;color:#475569;margin:4px 0 0">Enter the access code to view.</p><input id="gpw" type="password" placeholder="Access code" autofocus><button id="gbtn">Enter</button><p id="gerr" class="gerr"></p></div><div id="app" class="hidden" style="flex-direction:column;height:100%"><header class="top"><h1>iERP Survey - preview (3 versions)</h1></header><div class="tabs"><div class="tab active" data-t="latest">Latest (2026-07)</div><div class="tab" data-t="new">New (iERP spec)</div><div class="tab" data-t="existing">Existing (v2 cut)</div><div class="tab" data-t="sbs">Differences</div></div><div class="panes"><div class="pane active" id="pane-latest"><iframe src="latest_preview.html" title="Latest"></iframe></div><div class="pane" id="pane-new"><iframe src="new_preview.html" title="New"></iframe></div><div class="pane" id="pane-existing"><iframe src="existing_preview.html" title="Existing"></iframe></div><div class="pane" id="pane-sbs"><iframe src="diff_preview.html" title="Differences"></iframe></div></div></div><script>var GATE="aadb90adcb2ca911158949ccf55150064ca938f3093d61c42a3b7c50adc9d21e";async function sha(s){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}function unlock(){document.getElementById('gatebox').classList.add('hidden');var a=document.getElementById('app');a.classList.remove('hidden');a.style.display='flex';}function tab(id){document.querySelectorAll('.pane').forEach(function(p){p.classList.toggle('active',p.id==='pane-'+id);});document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.t===id);});}document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){tab(t.dataset.t);});});var ok=false;try{ok=sessionStorage.getItem('ierp_unlocked')==='1';}catch(e){}if(!GATE||ok){unlock();}var b=document.getElementById('gbtn');if(b){var go=async function(){try{var h=await sha(document.getElementById('gpw').value);if(h===GATE){try{sessionStorage.setItem('ierp_unlocked','1');}catch(e){}unlock();}else{document.getElementById('gerr').textContent='Incorrect code - try again.';}}catch(e){document.getElementById('gerr').textContent='Please open this page over https.';}};b.addEventListener('click',go);document.getElementById('gpw').addEventListener('keydown',function(e){if(e.key==='Enter')go();});}</script></body></html>
